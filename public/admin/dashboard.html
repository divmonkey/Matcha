<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Matcha Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
.dashboard { padding: 100px 0 60px; min-height: 100vh; background: var(--c-parchment); }
.dashboard-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: var(--sp-xl); }
.dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-lg); margin-bottom: var(--sp-xl); }
.stat-card {
  background: var(--c-white);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  padding: var(--sp-lg);
  text-align: center;
}
.stat-card h3 { font-family: var(--t-display); font-size: 2rem; font-weight: 300; color: var(--c-matcha); }
.stat-card p { font-size: .75rem; color: var(--c-muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 4px; }
.orders-table { width: 100%; border-collapse: collapse; background: var(--c-white); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--c-border); }
.orders-table th, .orders-table td { padding: 12px 16px; text-align: left; font-size: .85rem; }
.orders-table th { background: var(--c-matcha); color: var(--c-white); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; font-size: .72rem; }
.orders-table tr:nth-child(even) { background: var(--c-cream); }
.orders-table tr { transition: background .2s; cursor: pointer; }
.orders-table tr:hover { background: var(--c-sage); }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .65rem; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
.badge.completed { background: var(--c-sage); color: var(--c-matcha); }
.badge.pending { background: var(--c-cream-deep); color: var(--c-bark); }
.badge.shipped { background: #E6F3FF; color: #0066CC; }
.badge.delivered { background: #E6FFE6; color: #008000; }
.badge.refunded { background: #FFE6E6; color: #CC0000; }
.empty-state { text-align: center; padding: var(--sp-xl); color: var(--c-muted); font-style: italic; }
.back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--c-bark); font-size: .85rem; margin-bottom: var(--sp-lg); transition: color .2s; }
.back-link:hover { color: var(--c-matcha); }

/* Modal Styles */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(30, 42, 34, 0.4); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.modal {
  background: var(--c-white); border-radius: var(--radius-lg);
  width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto;
  padding: var(--sp-xl); position: relative; box-shadow: var(--shadow-xl);
}
.modal-close {
  position: absolute; top: 20px; right: 20px; font-size: 1.5rem;
  cursor: pointer; color: var(--c-muted); transition: color .2s;
}
.modal-close:hover { color: var(--c-ink); }
.modal-section { margin-bottom: var(--sp-lg); border-bottom: 1px solid var(--c-border); padding-bottom: var(--sp-md); }
.modal-section:last-child { border-bottom: none; }
.modal-section h4 { font-size: .75rem; text-transform: uppercase; letter-spacing: .1em; color: var(--c-muted); margin-bottom: var(--sp-sm); }
.modal-section p { font-size: .95rem; margin-bottom: 4px; }
.status-history { font-size: .8rem; color: var(--c-muted); padding-left: 0; list-style: none; }
.status-history li { margin-bottom: 4px; display: flex; justify-content: space-between; }

/* Settings Form */
.settings-form input {
  width: 100%; padding: 10px 16px; border: 1px solid var(--c-border); border-radius: 40px;
  font-family: var(--t-body); font-size: .9rem; margin-bottom: var(--sp-md); outline: none;
}
.settings-form input:focus { border-color: var(--c-matcha); }

@media (max-width: 900px) {
  .dashboard-grid { grid-template-columns: 1fr; }
  .dashboard-header { flex-direction: column; align-items: flex-start; gap: var(--sp-md); }
  .orders-table { display: block; overflow-x: auto; }
}
</style>
</head>
<body>

<nav class="nav" id="mainNav" style="border-bottom-color: var(--c-border);">
  <a href="/" class="nav-logo">Matcha <span>Book</span></a>
  <div class="nav-actions">
    <button onclick="openSettings()" class="nav-cta" style="background:transparent; color:var(--c-matcha); border:1px solid var(--c-matcha); margin-right:10px;">Settings</button>
    <button onclick="doLogout()" class="nav-cta">Logout</button>
  </div>
</nav>

<section class="dashboard">
  <div class="container">
    <div id="dashboardView">
      <div class="dashboard-header">
        <div>
          <div class="section-label">Admin</div>
          <h2 class="section-title" style="margin-bottom:0;">ADMIN <em>Dashboard</em></h2>
        </div>
        <div style="display:flex; gap:10px;">
           <button class="btn-primary" onclick="deleteAllOrders()" style="padding: 10px 20px; background:var(--c-bark);">Delete All</button>
           <button class="btn-primary" onclick="exportCSV()" style="padding: 10px 20px;">Export CSV</button>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="stat-card">
          <h3 id="statTotalOrders">0</h3>
          <p>Total Orders</p>
        </div>
        <div class="stat-card">
          <h3 id="statTotalRevenue">$0</h3>
          <p>Total Revenue</p>
        </div>
        <div class="stat-card">
          <h3 id="statToday">0</h3>
          <p>Orders Today</p>
        </div>
      </div>

      <div class="admin-controls" style="margin-bottom: var(--sp-lg); display: flex; gap: var(--sp-md); align-items: center;">
        <input type="text" id="orderSearch" placeholder="Search by ID, Name or Email..." style="flex: 1; padding: 10px 16px; border: 1px solid var(--c-border); border-radius: 40px; font-size: .9rem;" oninput="filterOrders()">
        <select id="statusFilter" style="padding: 10px 16px; border: 1px solid var(--c-border); border-radius: 40px; font-size: .9rem; background: var(--c-white);" onchange="filterOrders()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="refunded">Refunded</option>
        </select>
      </div>

      <div id="ordersContainer">
        <p class="empty-state">Loading orders...</p>
      </div>
    </div>
  </div>

  <!-- Order Detail Modal -->
  <div class="modal-overlay" id="orderModalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModalOverlay" onclick="if(event.target===this)closeSettings()">
    <div class="modal">
      <span class="modal-close" onclick="closeSettings()">&times;</span>
      <div class="dashboard-header" style="margin-bottom: var(--sp-lg);">
        <h2 class="section-title" style="font-size: 1.8rem; margin-bottom:0;">Admin <em>Settings</em></h2>
      </div>
      <div class="settings-form">
        <div class="modal-section">
          <h4>Notifications</h4>
          <p style="font-size: .85rem; color:var(--c-muted); margin-bottom:10px;">Email address for order notifications.</p>
          <input type="email" id="settingsEmail" placeholder="admin@example.com">
        </div>
        <div class="modal-section">
          <h4>Security</h4>
          <p style="font-size: .85rem; color:var(--c-muted); margin-bottom:10px;">Change admin dashboard password.</p>
          <input type="password" id="settingsPassword" placeholder="New password (leave blank to keep current)">
        </div>
        <button class="btn-primary" style="width:100%; justify-content:center;" onclick="saveSettings()">Save Changes</button>
      </div>
    </div>
  </div>
</section>

<script>
let allOrders = [];

async function checkAuth() {
  try {
    const res = await fetch('/api/admin/config');
    if (!res.ok) throw new Error('Unauthorized');
    const config = await res.json();
    document.getElementById('settingsEmail').value = config.email;
    loadOrders();
  } catch (err) {
    window.location.href = '/login/';
  }
}

async function doLogout() {
  await fetch('/api/admin/logout', { method: 'POST' });
  window.location.href = '/login/';
}

async function loadOrders() {
  try {
    const res = await fetch('/api/orders');
    if (!res.ok) {
      if (res.status === 401) window.location.href = '/login/';
      throw new Error();
    }
    allOrders = await res.json();
    renderOrders(allOrders);
    updateStats(allOrders);
  } catch (err) {
    document.getElementById('ordersContainer').innerHTML = '<p class="empty-state">Failed to load orders.</p>';
  }
}

function updateStats(orders) {
  const totalOrders = orders.length;
  const totalRevenue = orders.reduce((s, o) => s + (o.total || 0), 0);
  const today = new Date().toDateString();
  const ordersToday = orders.filter(o => new Date(o.createdAt).toDateString() === today).length;

  document.getElementById('statTotalOrders').textContent = totalOrders;
  document.getElementById('statTotalRevenue').textContent = '$' + totalRevenue.toFixed(2);
  document.getElementById('statToday').textContent = ordersToday;
}

function filterOrders() {
  const query = document.getElementById('orderSearch').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;

  const filtered = allOrders.filter(o => {
    const matchesQuery = !query || 
      o.id.toLowerCase().includes(query) || 
      (o.customerName && o.customerName.toLowerCase().includes(query)) || 
      (o.customerEmail && o.customerEmail.toLowerCase().includes(query));
    
    const matchesStatus = !status || o.status === status;
    
    return matchesQuery && matchesStatus;
  });

  renderOrders(filtered);
}

async function updateStatus(orderId, newStatus, stopProp = false) {
  if (stopProp) event.stopPropagation();
  
  if (newStatus === 'refunded') {
    if (!confirm('Are you sure you want to process a full refund for this order?')) {
      loadOrders(); // Refresh to revert dropdown
      return;
    }
  }

  try {
    const endpoint = newStatus === 'refunded' ? `/api/orders/${orderId}/refund` : `/api/orders/${orderId}/status`;
    const method = newStatus === 'refunded' ? 'POST' : 'PUT';
    const body = newStatus === 'refunded' ? {} : { status: newStatus };

    const res = await fetch(endpoint, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      const data = await res.json();
      const index = allOrders.findIndex(o => o.id === orderId);
      if (index !== -1) allOrders[index] = data.order || allOrders[index]; // For refund, data.order might not exist
      loadOrders(); // Reload to refresh everything
      if (document.getElementById('orderModalOverlay').style.display === 'flex') {
        closeModal();
      }
    } else {
      const err = await res.json();
      alert(err.error || 'Failed to update status.');
      loadOrders();
    }
  } catch (err) {
    console.error('Update status error:', err);
    alert('Error updating status.');
    loadOrders();
  }
}

async function resendConfirmation(orderId) {
  try {
    const res = await fetch(`/api/orders/${orderId}/resend-confirmation`, { method: 'POST' });
    if (res.ok) {
      alert('Confirmation email resent successfully.');
    } else {
      alert('Failed to resend confirmation.');
    }
  } catch (err) {
    console.error('Resend error:', err);
    alert('Error resending email.');
  }
}

function openModal(orderId) {
  const order = allOrders.find(o => o.id === orderId);
  if (!order) return;

  const content = `
    <div class="modal-section">
      <h4>Order Info</h4>
      <p><strong>ID:</strong> ${order.id}</p>
      <p><strong>Date:</strong> ${new Date(order.createdAt).toLocaleString()}</p>
      <p><strong>Status:</strong> <span class="badge ${order.status}">${order.status}</span></p>
    </div>
    <div class="modal-section">
      <h4>Customer Details</h4>
      <p><strong>Name:</strong> ${order.customerName || '—'}</p>
      <p><strong>Email:</strong> ${order.customerEmail || '—'}</p>
      <p><strong>Address:</strong> ${order.address || '—'}</p>
    </div>
    <div class="modal-section">
      <h4>Items</h4>
      <ul style="padding-left: 20px; font-size: .9rem;">
        ${order.items.map(i => `<li>${i.name} x${i.qty} — $${(i.price * i.qty).toFixed(2)}</li>`).join('')}
      </ul>
      <p style="margin-top: 10px;"><strong>Total: $${(order.total || 0).toFixed(2)}</strong></p>
    </div>
    <div class="modal-section">
      <h4>Status History</h4>
      <ul class="status-history">
        ${order.statusHistory.map(h => `<li><span>${h.status.toUpperCase()}</span> <span>${new Date(h.timestamp).toLocaleString()}</span></li>`).reverse().join('')}
      </ul>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button class="btn-primary" style="flex: 1; justify-content: center;" onclick="resendConfirmation('${order.id}')">Resend Email</button>
      <select onchange="updateStatus('${order.id}', this.value)" class="btn-primary" style="flex: 1; background: var(--c-white); color: var(--c-matcha); border: 1px solid var(--c-matcha); justify-content: center;">
        <option value="" disabled selected>Update Status</option>
        <option value="pending">Pending</option>
        <option value="completed">Completed</option>
        <option value="shipped">Shipped</option>
        <option value="delivered">Delivered</option>
        <option value="refunded">Refunded</option>
      </select>
    </div>
  `;

  document.getElementById('modalContent').innerHTML = content;
  document.getElementById('orderModalOverlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('orderModalOverlay').style.display = 'none';
}

function openSettings() {
  document.getElementById('settingsModalOverlay').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settingsModalOverlay').style.display = 'none';
}

async function saveSettings() {
  const email = document.getElementById('settingsEmail').value.trim();
  const password = document.getElementById('settingsPassword').value.trim();
  
  const payload = { email };
  if (password) payload.password = password;

  try {
    const res = await fetch('/api/admin/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      alert('Settings saved successfully.');
      closeSettings();
      if (password) window.location.href = '/login/';
    } else {
      alert('Failed to save settings.');
    }
  } catch (err) {
    alert('Error saving settings.');
  }
}

function renderOrders(orders) {
  const container = document.getElementById('ordersContainer');
  if (!orders.length) {
    container.innerHTML = '<p class="empty-state">No orders found.</p>';
    return;
  }

  const rows = orders.map(o => `
    <tr onclick="openModal('${o.id}')">
      <td><strong>${o.id}</strong></td>
      <td>${o.customerName || '—'}</td>
      <td>${o.customerEmail || '—'}</td>
      <td>${o.items.map(i => i.name + ' x' + i.qty).join(', ')}</td>
      <td>$${(o.total || 0).toFixed(2)}</td>
      <td>
        <select onclick="event.stopPropagation()" onchange="updateStatus('${o.id}', this.value, true)" class="badge ${o.status}" style="border:none; outline:none; cursor:pointer; font-family:inherit;">
          <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Pending</option>
          <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>Completed</option>
          <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>Shipped</option>
          <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Delivered</option>
          <option value="refunded" ${o.status === 'refunded' ? 'selected' : ''}>Refunded</option>
        </select>
      </td>
      <td>${new Date(o.createdAt).toLocaleDateString()}</td>
    </tr>
  `).join('');

  container.innerHTML = `
    <table class="orders-table">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Email</th>
          <th>Items</th>
          <th>Total</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function exportCSV() {
  const query = document.getElementById('orderSearch').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const filtered = allOrders.filter(o => {
    const matchesQuery = !query || 
      o.id.toLowerCase().includes(query) || 
      (o.customerName && o.customerName.toLowerCase().includes(query)) || 
      (o.customerEmail && o.customerEmail.toLowerCase().includes(query));
    const matchesStatus = !status || o.status === status;
    return matchesQuery && matchesStatus;
  });

  if (!filtered.length) return alert('No orders to export.');

  const headers = ['Order ID', 'Customer', 'Email', 'Items', 'Total', 'Status', 'Date'];
  const rows = filtered.map(o => [
    o.id,
    o.customerName || '',
    o.customerEmail || '',
    o.items.map(i => i.name + ' x' + i.qty).join('; '),
    (o.total || 0).toFixed(2),
    o.status,
    new Date(o.createdAt).toLocaleDateString()
  ]);

  const csvContent = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `orders-export-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

window.addEventListener('scroll', () => {
  document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

async function deleteAllOrders() {
  if (confirm('Are you sure you want to delete ALL orders? This cannot be undone.')) {
    try {
      const res = await fetch('/api/orders', { method: 'DELETE' });
      if (res.ok) {
        loadOrders();
      } else {
        alert('Failed to delete orders.');
      }
    } catch (err) {
      alert('Error deleting orders.');
    }
  }
}

checkAuth();
</script>

</body>
</html>
