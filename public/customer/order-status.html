<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Your Order — Matcha Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
.dashboard { padding: 100px 0 60px; min-height: 100vh; background: var(--c-parchment); }
.dashboard-header { margin-bottom: var(--sp-xl); text-align: center; }
.card {
  background: var(--c-white);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  padding: var(--sp-xl);
  max-width: 600px;
  margin: 0 auto var(--sp-lg);
}
.lookup-box { text-align: center; }
.lookup-box input {
  width: 100%; padding: 12px 16px; border: 1px solid var(--c-border); border-radius: 40px;
  font-family: var(--t-body); font-size: .9rem; margin-bottom: var(--sp-md); outline: none;
}
.lookup-box input:focus { border-color: var(--c-matcha); box-shadow: 0 0 0 3px rgba(61,107,79,.12); }

/* Timeline Styles */
.timeline {
  display: flex; justify-content: space-between; margin: var(--sp-xl) 0; position: relative;
  padding: 0 10px;
}
.timeline::before {
  content: ''; position: absolute; top: 15px; left: 10px; right: 10px; height: 2px;
  background: var(--c-cream-deep); z-index: 1;
}
.timeline-step {
  position: relative; z-index: 2; text-align: center; width: 80px;
}
.step-dot {
  width: 32px; height: 32px; background: var(--c-white); border: 2px solid var(--c-cream-deep);
  border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center;
  transition: all .3s;
}
.timeline-step.active .step-dot { border-color: var(--c-matcha); background: var(--c-matcha); color: var(--c-white); }
.timeline-step.completed .step-dot { border-color: var(--c-matcha); background: var(--c-sage); color: var(--c-matcha); }
.step-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--c-muted); }
.timeline-step.active .step-label { color: var(--c-matcha); font-weight: 500; }

.order-details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-lg); margin-top: var(--sp-lg); }
.detail-item h4 { font-size: .75rem; text-transform: uppercase; color: var(--c-muted); margin-bottom: 4px; }
.detail-item p { font-size: .95rem; }

.items-list { margin-top: var(--sp-lg); border-top: 1px solid var(--c-border); padding-top: var(--sp-md); }
.item-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: .9rem; }

.error-msg { color: var(--c-error); font-size: .85rem; margin-top: var(--sp-sm); display: none; }
.back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--c-bark); font-size: .85rem; margin-bottom: var(--sp-lg); transition: color .2s; }
.back-link:hover { color: var(--c-matcha); }

@media (max-width: 600px) {
  .order-details-grid { grid-template-columns: 1fr; }
  .timeline { flex-direction: column; gap: var(--sp-md); padding-left: 40px; }
  .timeline::before { left: 55px; top: 0; bottom: 0; width: 2px; height: auto; }
  .timeline-step { flex-direction: row; text-align: left; width: 100%; display: flex; align-items: center; gap: 15px; }
  .step-dot { margin: 0; }
}
</style>
</head>
<body>

<nav class="nav" id="mainNav">
  <a href="/" class="nav-logo">Matcha <span>Book</span></a>
</nav>

<section class="dashboard">
  <div class="container">
    <a href="/" class="back-link">← Back to Shop</a>

    <div id="lookupView">
      <div class="dashboard-header">
        <div class="section-label">Track Order</div>
        <h2 class="section-title">Where is my <em>Book?</em></h2>
      </div>
      <div class="card lookup-box">
        <p style="margin-bottom: var(--sp-lg);">Enter your Order ID and Email to view live status.</p>
        <input type="text" id="orderId" placeholder="Order ID (e.g. ORD-12345678)" onkeydown="if(event.key==='Enter')trackOrder()">
        <input type="email" id="email" placeholder="Email address" onkeydown="if(event.key==='Enter')trackOrder()">
        <button class="btn-primary" style="width:100%; justify-content:center;" onclick="trackOrder()">Track Order</button>
        <p id="errorMsg" class="error-msg"></p>
      </div>
    </div>

    <div id="statusView" style="display:none;">
      <div class="dashboard-header">
        <div class="section-label">Order Status</div>
        <h2 class="section-title" id="displayOrderId">ORD-XXXXXX</h2>
      </div>

      <div class="card">
        <div class="timeline" id="statusTimeline">
          <!-- Timeline steps injected by JS -->
        </div>

        <div id="trackingInfo" style="display:none; text-align:center; margin: var(--sp-lg) 0; padding: var(--sp-md); background: var(--c-sage); border-radius: var(--radius-md);">
          <p style="font-size: .9rem;"><strong>Your order has shipped!</strong></p>
          <a id="trackingLink" href="#" target="_blank" class="btn-primary" style="margin-top: 10px; display: inline-flex;">Track Shipment</a>
        </div>

        <div class="order-details-grid">
          <div class="detail-item">
            <h4>Customer</h4>
            <p id="customerName"></p>
          </div>
          <div class="detail-item">
            <h4>Shipping Address</h4>
            <p id="shippingAddress"></p>
          </div>
          <div class="detail-item">
            <h4>Date Placed</h4>
            <p id="datePlaced"></p>
          </div>
          <div class="detail-item">
            <h4>Payment</h4>
            <p id="paymentMethod"></p>
          </div>
        </div>

        <div class="items-list" id="itemsList">
          <!-- Items injected by JS -->
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: var(--sp-md); font-weight: 500;">
          <span>Total</span>
          <span id="orderTotal"></span>
        </div>
      </div>
      
      <div style="text-align: center;">
        <button class="btn-primary" style="background: transparent; color: var(--c-matcha); border: 1px solid var(--c-matcha);" onclick="resetLookup()">Track Another Order</button>
      </div>
    </div>
  </div>
</section>

<script>
const statusSteps = [
  { id: 'pending', label: 'Ordered' },
  { id: 'completed', label: 'Confirmed' },
  { id: 'shipped', label: 'Shipped' },
  { id: 'delivered', label: 'Delivered' }
];

async function trackOrder() {
  const orderId = document.getElementById('orderId').value.trim();
  const email = document.getElementById('email').value.trim();
  const errorEl = document.getElementById('errorMsg');

  if (!orderId || !email) {
    errorEl.textContent = 'Please enter both Order ID and Email.';
    errorEl.style.display = 'block';
    return;
  }

  errorEl.style.display = 'none';

  try {
    const res = await fetch(`/api/orders/lookup?orderId=${encodeURIComponent(orderId)}&email=${encodeURIComponent(email)}`);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Order not found.');
    }
    const order = await res.json();
    displayOrder(order);
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.style.display = 'block';
  }
}

function displayOrder(order) {
  document.getElementById('lookupView').style.display = 'none';
  document.getElementById('statusView').style.display = 'block';
  document.getElementById('displayOrderId').textContent = order.id;
  document.getElementById('customerName').textContent = order.customerName;
  document.getElementById('shippingAddress').textContent = order.address || '—';
  document.getElementById('datePlaced').textContent = new Date(order.createdAt).toLocaleDateString();
  document.getElementById('paymentMethod').textContent = (order.paymentMethod || 'Paypal').toUpperCase();
  document.getElementById('orderTotal').textContent = '$' + (order.total || 0).toFixed(2);

  // Timeline
  const timelineEl = document.getElementById('statusTimeline');
  const currentIndex = statusSteps.findIndex(s => s.id === order.status);
  
  timelineEl.innerHTML = statusSteps.map((step, index) => {
    let classes = 'timeline-step';
    if (index === currentIndex) classes += ' active';
    if (index < currentIndex) classes += ' completed';
    
    return `
      <div class="${classes}">
        <div class="step-dot">${index < currentIndex ? '✓' : index + 1}</div>
        <div class="step-label">${step.label}</div>
      </div>
    `;
  }).join('');

  // Tracking Info
  const trackingBox = document.getElementById('trackingInfo');
  if (order.status === 'shipped' || order.status === 'delivered') {
    if (order.shippingTrackingUrl) {
      trackingBox.style.display = 'block';
      document.getElementById('trackingLink').href = order.shippingTrackingUrl;
    } else {
      trackingBox.style.display = 'none';
    }
  } else {
    trackingBox.style.display = 'none';
  }

  // Items
  document.getElementById('itemsList').innerHTML = order.items.map(i => `
    <div class="item-row">
      <span>${i.name} <span style="color:var(--c-muted);">x${i.qty}</span></span>
      <span>$${(i.price * i.qty).toFixed(2)}</span>
    </div>
  `).join('');
}

function resetLookup() {
  document.getElementById('statusView').style.display = 'none';
  document.getElementById('lookupView').style.display = 'block';
  document.getElementById('orderId').value = '';
  document.getElementById('errorMsg').style.display = 'none';
}

// Auto-lookup from URL
const params = new URLSearchParams(window.location.search);
if (params.get('orderId') && params.get('email')) {
  document.getElementById('orderId').value = params.get('orderId');
  document.getElementById('email').value = params.get('email');
  trackOrder();
}
</script>

</body>
</html>
