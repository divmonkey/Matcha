<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders — Matcha Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
.dashboard { padding: 100px 0 60px; min-height: 100vh; background: var(--c-parchment); }
.dashboard-header { margin-bottom: var(--sp-xl); }
.order-card {
  background: var(--c-white);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  padding: var(--sp-lg);
  margin-bottom: var(--sp-md);
  transition: box-shadow .3s;
}
.order-card:hover { box-shadow: var(--shadow-md); }
.order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--sp-md); flex-wrap: wrap; gap: var(--sp-sm); }
.order-id { font-family: var(--t-display); font-size: 1.2rem; font-weight: 300; color: var(--c-ink); }
.order-date { font-size: .78rem; color: var(--c-muted); }
.order-items { margin-bottom: var(--sp-md); }
.order-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--c-cream); font-size: .85rem; }
.order-item:last-child { border-bottom: none; }
.order-footer { display: flex; justify-content: space-between; align-items: center; padding-top: var(--sp-md); border-top: 1px solid var(--c-border); }
.order-total { font-family: var(--t-display); font-size: 1.2rem; font-weight: 300; color: var(--c-matcha); }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .65rem; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
.badge.completed { background: var(--c-sage); color: var(--c-matcha); }
.lookup-box {
  max-width: 480px; margin: 0 auto var(--sp-xl); background: var(--c-white);
  border: 1px solid var(--c-border); border-radius: var(--radius-lg);
  padding: var(--sp-lg); text-align: center;
}
.lookup-box h2 { font-family: var(--t-display); font-size: 1.6rem; font-weight: 300; color: var(--c-ink); margin-bottom: var(--sp-sm); }
.lookup-box p { font-size: .85rem; color: var(--c-muted); margin-bottom: var(--sp-md); }
.lookup-box input {
  width: 100%; padding: 12px 16px; border: 1px solid var(--c-border); border-radius: 40px;
  font-family: var(--t-body); font-size: .9rem; margin-bottom: var(--sp-sm); outline: none;
}
.lookup-box input:focus { border-color: var(--c-matcha); box-shadow: 0 0 0 3px rgba(61,107,79,.12); }
.empty-state { text-align: center; padding: var(--sp-xl); color: var(--c-muted); font-style: italic; }
.back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--c-bark); font-size: .85rem; margin-bottom: var(--sp-lg); transition: color .2s; }
.back-link:hover { color: var(--c-matcha); }
</style>
</head>
<body>

<nav class="nav" id="mainNav" style="border-bottom-color: var(--c-border);">
  <a href="/" class="nav-logo">Matcha <span>Book</span></a>
  <div class="nav-actions">
    <a href="/" class="nav-cta">Back to Shop</a>
  </div>
</nav>

<section class="dashboard">
  <div class="container">
    <a href="/" class="back-link">← Back to Shop</a>

    <div class="dashboard-header">
      <div class="section-label">Account</div>
      <h2 class="section-title">My <em>Orders</em></h2>
    </div>

    <div class="lookup-box">
      <h2>Find Your Orders</h2>
      <p>Enter the email address you used during checkout to see your order history.</p>
      <input type="email" id="customerEmail" placeholder="your@email.com" value="" onkeydown="if(event.key==='Enter')lookupOrders()">
      <button class="btn-primary" style="width:100%; justify-content:center;" onclick="lookupOrders()">View My Orders</button>
    </div>

    <div id="ordersContainer"></div>
  </div>
</section>

<script>
async function lookupOrders() {
  const email = document.getElementById('customerEmail').value.trim();
  if (!email) {
    document.getElementById('ordersContainer').innerHTML = '<p class="empty-state">Please enter your email address.</p>';
    return;
  }

  document.getElementById('ordersContainer').innerHTML = '<p class="empty-state">Loading...</p>';

  try {
    const res = await fetch('/api/orders/customer/' + encodeURIComponent(email));
    const orders = await res.json();
    renderOrders(orders, email);
  } catch (err) {
    document.getElementById('ordersContainer').innerHTML = '<p class="empty-state">Failed to load orders. Please try again.</p>';
  }
}

function renderOrders(orders, email) {
  const container = document.getElementById('ordersContainer');
  if (!orders.length) {
    container.innerHTML = `<p class="empty-state">No orders found for <strong>${email}</strong>.</p>`;
    return;
  }

  container.innerHTML = orders.map(o => `
    <div class="order-card">
      <div class="order-header">
        <div>
          <div class="order-id">${o.id}</div>
          <div class="order-date">${new Date(o.createdAt).toLocaleString()}</div>
        </div>
        <span class="badge ${o.status}">${o.status}</span>
      </div>
      <div class="order-items">
        ${o.items.map(i => `
          <div class="order-item">
            <span>${i.name} <span style="color:var(--c-muted);">x${i.qty}</span></span>
            <span>$${(i.price * i.qty).toFixed(2)}</span>
          </div>
        `).join('')}
      </div>
      <div class="order-footer">
        <span style="font-size:.85rem; color:var(--c-muted);">Total</span>
        <span class="order-total">$${(o.total || 0).toFixed(2)}</span>
      </div>
    </div>
  `).join('');
}

// Auto-fill email from URL param
const params = new URLSearchParams(window.location.search);
const emailParam = params.get('email');
if (emailParam) {
  document.getElementById('customerEmail').value = emailParam;
  lookupOrders();
}

window.addEventListener('scroll', () => {
  document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });
</script>

</body>
</html>
